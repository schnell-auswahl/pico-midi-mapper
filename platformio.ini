; PlatformIO Project Configuration File
;
; Pico MIDI Mapper - Universal MIDI-to-GPIO Controller
; https://github.com/YOUR_USERNAME/pico-midi-mapper
;
; For configuration details visit:
; https://docs.platformio.org/page/projectconf.html

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
board_build.core = earlephilhower
framework = arduino
upload_protocol = picotool
monitor_speed = 115200

; LittleFS filesystem (1MB for config files)
board_build.filesystem_size = 1m

; USB MIDI libraries + JSON parser
lib_deps = 
    adafruit/Adafruit TinyUSB Library @ ^3.7.5
    fortyseveneffects/MIDI Library @ ^5.0.2
    bblanchon/ArduinoJson @ ^6.21.5

; Build flags
build_flags = 
    -D USE_TINYUSB
    -std=gnu++17
    -D CONFIG_BUTTON_PIN=22